<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
<title>GridPad</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Caveat:wght@400;600;700&family=IBM+Plex+Mono:wght@300;400;500&display=swap');

  /* ═══════════════════════════════════════════
     THEME 1: CREAM PAPER
     ═══════════════════════════════════════════ */
  [data-theme="cream"] {
    --bg-deep: #e8e0ca;
    --bg-surface: #f5f0e1;
    --bg-card: #f5f0e1;
    --bg-card-hover: #ede5d0;
    --bg-elevated: #fff;
    --border: #a8b8c4;
    --border-light: #a8b8c4;
    --border-focus: #2980b9;
    --text-primary: #2c3e50;
    --text-secondary: #5a6c7d;
    --text-muted: #8a9bab;
    --accent-main: #2980b9;
    --accent-main-dim: rgba(41, 128, 185, 0.08);
    --accent-danger: #c0392b;
    --accent-danger-dim: rgba(192, 57, 43, 0.06);
    --accent-save: #2980b9;
    --accent-save-hover: #2471a3;
    --accent-tag: #2980b9;
    --line-faint: rgba(209, 218, 224, 0.5);
    --line-rule: #b8c4cc;
    --shadow-soft: 0 2px 20px rgba(0,0,0,0.08);
    --shadow-lift: 0 8px 40px rgba(0,0,0,0.15);
    --glow-accent: none;
    --glow-danger: none;
    --overlay-bg: #f5f0e1;
    --dialog-bg: #f5f0e1;
    --dialog-backdrop: rgba(44, 62, 80, 0.4);
    --input-bg: rgba(255,255,255,0.6);
    --input-focus-bg: rgba(255,255,255,0.9);
    --content-item-bg: rgba(255,255,255,0.5);
    --scrollbar-thumb: #b8c4cc;
    --scrollbar-hover: #8a9bab;
    --red-line-opacity: 0.3;
    --btn-primary-bg: #2c3e50;
    --btn-primary-color: #f5f0e1;
    --btn-primary-hover-bg: #2980b9;
    --btn-primary-hover-border: #2980b9;
    --paper-line-opacity: 0.5;
    --cell-line-opacity: 0.6;
    --overlay-line-opacity: 0.3;
    --dot-glow: none;
  }

  /* ═══════════════════════════════════════════
     THEME 2: MIDNIGHT (dark GitHub)
     ═══════════════════════════════════════════ */
  [data-theme="midnight"] {
    --bg-deep: #0d1117;
    --bg-surface: #161b22;
    --bg-card: #1c2129;
    --bg-card-hover: #21262d;
    --bg-elevated: #242a33;
    --border: #30363d;
    --border-light: #21262d;
    --border-focus: #58a6ff;
    --text-primary: #e6edf3;
    --text-secondary: #8b949e;
    --text-muted: #484f58;
    --accent-main: #58a6ff;
    --accent-main-dim: rgba(88, 166, 255, 0.12);
    --accent-danger: #f85149;
    --accent-danger-dim: rgba(248, 81, 73, 0.12);
    --accent-save: #58a6ff;
    --accent-save-hover: #79b8ff;
    --accent-tag: #bc8cff;
    --line-faint: rgba(48, 54, 61, 0.5);
    --line-rule: rgba(48, 54, 61, 0.8);
    --shadow-soft: 0 2px 20px rgba(0,0,0,0.3);
    --shadow-lift: 0 8px 40px rgba(0,0,0,0.5);
    --glow-accent: 0 0 20px rgba(88, 166, 255, 0.15);
    --glow-danger: 0 0 16px rgba(248, 81, 73, 0.15);
    --overlay-bg: #0d1117;
    --dialog-bg: #161b22;
    --dialog-backdrop: rgba(0, 0, 0, 0.6);
    --input-bg: #1c2129;
    --input-focus-bg: #242a33;
    --content-item-bg: #161b22;
    --scrollbar-thumb: #30363d;
    --scrollbar-hover: #484f58;
    --red-line-opacity: 0.2;
    --btn-primary-bg: #e6edf3;
    --btn-primary-color: #0d1117;
    --btn-primary-hover-bg: #58a6ff;
    --btn-primary-hover-border: #58a6ff;
    --paper-line-opacity: 0.4;
    --cell-line-opacity: 0.4;
    --overlay-line-opacity: 0.2;
    --dot-glow: 0 0 8px rgba(88, 166, 255, 0.4);
  }

  /* ═══════════════════════════════════════════
     THEME 3: DUSK (purple/warm)
     ═══════════════════════════════════════════ */
  [data-theme="dusk"] {
    --bg-deep: #1a1525;
    --bg-surface: #221c30;
    --bg-card: #2a2339;
    --bg-card-hover: #332b44;
    --bg-elevated: #3a3150;
    --border: #3e3555;
    --border-light: #2f2841;
    --border-focus: #e8976c;
    --text-primary: #ede4f5;
    --text-secondary: #a99bbe;
    --text-muted: #6b5f80;
    --accent-main: #e8976c;
    --accent-main-dim: rgba(232, 151, 108, 0.12);
    --accent-danger: #d4728c;
    --accent-danger-dim: rgba(212, 114, 140, 0.12);
    --accent-save: #e8976c;
    --accent-save-hover: #eead8a;
    --accent-tag: #e2b96e;
    --line-faint: rgba(62, 53, 85, 0.5);
    --line-rule: rgba(62, 53, 85, 0.8);
    --shadow-soft: 0 2px 20px rgba(0,0,0,0.3);
    --shadow-lift: 0 8px 40px rgba(0,0,0,0.5);
    --glow-accent: 0 0 20px rgba(232, 151, 108, 0.15);
    --glow-danger: 0 0 16px rgba(212, 114, 140, 0.15);
    --overlay-bg: #1a1525;
    --dialog-bg: #221c30;
    --dialog-backdrop: rgba(0, 0, 0, 0.6);
    --input-bg: #2a2339;
    --input-focus-bg: #3a3150;
    --content-item-bg: #221c30;
    --scrollbar-thumb: #3e3555;
    --scrollbar-hover: #6b5f80;
    --red-line-opacity: 0.2;
    --btn-primary-bg: #ede4f5;
    --btn-primary-color: #1a1525;
    --btn-primary-hover-bg: #e8976c;
    --btn-primary-hover-border: #e8976c;
    --paper-line-opacity: 0.4;
    --cell-line-opacity: 0.4;
    --overlay-line-opacity: 0.2;
    --dot-glow: 0 0 8px rgba(232, 151, 108, 0.4);
  }

  /* ═══════════════════════════════════════════
     CORE STYLES (theme-agnostic)
     ═══════════════════════════════════════════ */
  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    height: 100%;
    overflow: hidden;
    font-family: 'IBM Plex Mono', monospace;
    background: var(--bg-deep);
    color: var(--text-primary);
    transition: background 0.35s ease, color 0.35s ease;
    -webkit-tap-highlight-color: transparent;
    -webkit-touch-callout: none;
  }

  /* ─── PAPER TEXTURE BG ─── */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      repeating-linear-gradient(
        0deg, transparent, transparent 31px,
        var(--line-faint) 31px, var(--line-faint) 32px
      ),
      repeating-linear-gradient(
        90deg, transparent, transparent 31px,
        var(--line-faint) 31px, var(--line-faint) 32px
      );
    opacity: var(--paper-line-opacity);
    pointer-events: none;
    z-index: 0;
    transition: opacity 0.35s ease;
  }

  /* ─── TOP BAR ─── */
  .top-bar {
    position: relative;
    z-index: 2;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 16px;
    background: var(--bg-surface);
    border-bottom: 1px solid var(--border);
    box-shadow: 0 1px 12px rgba(0,0,0,0.15);
    transition: background 0.35s, border-color 0.35s;
  }

  .top-bar-left {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .top-bar h1 {
    font-family: 'Caveat', cursive;
    font-size: 28px;
    font-weight: 700;
    color: var(--text-primary);
    letter-spacing: -0.5px;
    transition: color 0.35s;
  }

  .top-bar h1 span {
    color: var(--accent-main);
    transition: color 0.35s;
  }

  .top-bar-right {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .grid-controls {
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .grid-controls label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--text-muted);
    font-weight: 500;
    transition: color 0.35s;
    display: none;
  }

  .grid-size-btn {
    width: 32px;
    height: 32px;
    border: 1.5px solid var(--border);
    background: var(--bg-surface);
    border-radius: 6px;
    cursor: pointer;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 13px;
    font-weight: 500;
    color: var(--text-secondary);
    transition: all 0.15s;
    display: flex;
    align-items: center;
    justify-content: center;
    -webkit-tap-highlight-color: transparent;
  }

  .grid-size-btn:hover, .grid-size-btn:active {
    background: var(--accent-main);
    color: var(--bg-deep);
    border-color: var(--accent-main);
    transform: translateY(-1px);
    box-shadow: var(--glow-accent);
  }

  .grid-size-btn.active {
    background: var(--text-primary);
    color: var(--bg-deep);
    border-color: var(--text-primary);
  }

  /* ─── THEME TOGGLE ─── */
  .theme-toggle {
    width: 32px;
    height: 32px;
    border: 1.5px solid var(--border);
    background: var(--bg-surface);
    border-radius: 6px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    transition: all 0.15s;
    -webkit-tap-highlight-color: transparent;
    position: relative;
  }

  .theme-toggle:hover, .theme-toggle:active {
    border-color: var(--accent-main);
    box-shadow: var(--glow-accent);
    transform: translateY(-1px);
  }

  /* Theme picker dropdown - FIXED colors independent of theme */
  .theme-picker {
    position: absolute;
    top: 100%;
    right: 0;
    margin-top: 8px;
    background: #ffffff;
    border: 1px solid #d1d5db;
    border-radius: 10px;
    box-shadow: 0 8px 30px rgba(0,0,0,0.18);
    z-index: 50;
    display: none;
    overflow: hidden;
    min-width: 180px;
  }

  .theme-picker.visible {
    display: block;
    animation: pickerDrop 0.2s ease;
  }

  @keyframes pickerDrop {
    from { opacity: 0; transform: translateY(-8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .theme-option {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 12px 16px;
    cursor: pointer;
    transition: background 0.1s;
    border: none;
    background: none;
    width: 100%;
    text-align: left;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    color: #374151;
    -webkit-tap-highlight-color: transparent;
  }

  .theme-option:hover, .theme-option:active {
    background: #f3f4f6;
  }

  .theme-option.active {
    font-weight: 500;
    color: #2563eb;
  }

  .theme-swatch {
    width: 20px;
    height: 20px;
    border-radius: 50%;
    border: 2px solid #d1d5db;
    flex-shrink: 0;
  }

  .theme-option.active .theme-swatch {
    border-color: #2563eb;
    box-shadow: 0 0 0 2px rgba(37, 99, 235, 0.2);
  }

  .swatch-cream { background: linear-gradient(135deg, #f5f0e1, #e8e0ca); }
  .swatch-midnight { background: linear-gradient(135deg, #161b22, #0d1117); }
  .swatch-dusk { background: linear-gradient(135deg, #2a2339, #1a1525); }

  /* Privacy link in theme picker */
  .theme-picker-footer {
    border-top: 1px solid #e5e7eb;
    padding: 8px 16px;
    text-align: center;
  }

  .privacy-link {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    color: #9ca3af;
    text-decoration: none;
    letter-spacing: 0.5px;
    transition: color 0.15s;
  }

  .privacy-link:hover, .privacy-link:active {
    color: #6b7280;
    text-decoration: underline;
  }

  /* ─── GRID ─── */
  .grid-container {
    position: relative;
    z-index: 1;
    height: calc(100vh - 54px);
    height: calc(100dvh - 54px);
    overflow: auto;
    padding: 8px;
    -webkit-overflow-scrolling: touch;
  }

  .grid {
    display: grid;
    gap: 2px;
    min-height: 100%;
    transition: all 0.3s ease;
  }

  .grid-cell {
    background: var(--bg-card);
    border: 1px solid var(--border-light);
    border-radius: 4px;
    cursor: pointer;
    position: relative;
    overflow: hidden;
    transition: all 0.2s ease;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 72px;
    -webkit-tap-highlight-color: transparent;
  }

  .grid-cell::before {
    content: '';
    position: absolute;
    inset: 0;
    background:
      repeating-linear-gradient(
        0deg, transparent, transparent 23px,
        var(--line-faint) 23px, var(--line-faint) 24px
      );
    opacity: var(--cell-line-opacity);
    pointer-events: none;
  }

  .grid-cell:hover {
    background: var(--bg-card-hover);
    border-color: var(--accent-main);
    box-shadow: var(--glow-accent);
    transform: translateY(-1px);
  }

  .grid-cell:active {
    transform: translateY(0);
  }

  .grid-cell.has-content {
    border-color: var(--border);
  }

  .grid-cell.has-content::after {
    content: '';
    position: absolute;
    top: 5px;
    right: 5px;
    width: 7px;
    height: 7px;
    background: var(--accent-main);
    border-radius: 50%;
    opacity: 0.8;
    box-shadow: var(--dot-glow);
  }

  .cell-preview {
    position: relative;
    z-index: 1;
    padding: 8px;
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    gap: 3px;
    overflow: hidden;
  }

  .cell-preview-text {
    color: var(--text-secondary);
    line-height: 1.3;
    overflow: hidden;
    text-overflow: ellipsis;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    font-family: 'Caveat', cursive;
    font-size: 13px;
    transition: color 0.35s;
  }

  .cell-preview-url {
    font-size: 9px;
    color: var(--accent-main);
    text-decoration: none;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    transition: color 0.35s;
  }

  .cell-preview-img {
    width: 100%;
    height: 50px;
    object-fit: cover;
    border-radius: 2px;
    opacity: 0.8;
  }

  .cell-empty-icon {
    position: relative;
    z-index: 1;
    font-size: 18px;
    color: var(--text-muted);
    opacity: 0;
    transition: opacity 0.2s;
  }

  .grid-cell:hover .cell-empty-icon {
    opacity: 0.5;
  }

  /* ─── FULLSCREEN OVERLAY ─── */
  .overlay {
    position: fixed;
    inset: 0;
    z-index: 100;
    background: var(--overlay-bg);
    display: none;
    flex-direction: column;
    opacity: 0;
    transition: opacity 0.25s ease, background 0.35s;
  }

  .overlay.visible {
    display: flex;
    opacity: 1;
  }

  .overlay::before {
    content: '';
    position: absolute;
    inset: 0;
    background:
      repeating-linear-gradient(
        0deg, transparent, transparent 31px,
        var(--line-rule) 31px, var(--line-rule) 32px
      );
    opacity: var(--overlay-line-opacity);
    pointer-events: none;
  }

  .overlay::after {
    content: '';
    position: absolute;
    left: 28px;
    top: 60px;
    bottom: 20px;
    width: 2px;
    background: var(--accent-danger);
    opacity: var(--red-line-opacity);
    pointer-events: none;
  }

  .overlay-header {
    position: relative;
    z-index: 2;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 20px;
    padding-top: max(16px, env(safe-area-inset-top, 16px));
    border-bottom: 1px solid var(--border);
    background: var(--bg-surface);
    transition: background 0.35s, border-color 0.35s;
  }

  .overlay-header-left {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .overlay-title {
    font-family: 'Caveat', cursive;
    font-size: 22px;
    font-weight: 600;
    color: var(--text-primary);
    transition: color 0.35s;
  }

  .overlay-notepad {
    font-size: 24px;
    line-height: 1;
  }

  .close-btn {
    width: 44px;
    height: 44px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 24px;
    font-weight: 300;
    color: var(--text-secondary);
    background: none;
    border: 1.5px solid var(--border);
    border-radius: 10px;
    cursor: pointer;
    transition: all 0.15s;
    font-family: 'IBM Plex Mono', monospace;
    -webkit-tap-highlight-color: transparent;
  }

  .close-btn:hover, .close-btn:active {
    color: var(--accent-danger);
    border-color: var(--accent-danger);
    background: var(--accent-danger-dim);
    box-shadow: var(--glow-danger);
  }

  .overlay-body {
    position: relative;
    z-index: 2;
    flex: 1;
    overflow-y: auto;
    padding: 24px 20px;
    -webkit-overflow-scrolling: touch;
  }

  /* ─── VIEW MODE ─── */
  .view-content {
    max-width: 700px;
    margin: 0 auto;
  }

  .content-item {
    margin-bottom: 16px;
    padding: 14px 16px;
    background: var(--content-item-bg);
    border: 1px solid var(--border-light);
    border-radius: 8px;
    animation: slideUp 0.3s ease forwards;
    opacity: 0;
    transform: translateY(10px);
    transition: background 0.35s, border-color 0.35s;
  }

  @keyframes slideUp {
    to { opacity: 1; transform: translateY(0); }
  }

  .content-item:nth-child(1) { animation-delay: 0.05s; }
  .content-item:nth-child(2) { animation-delay: 0.1s; }
  .content-item:nth-child(3) { animation-delay: 0.15s; }
  .content-item:nth-child(4) { animation-delay: 0.2s; }
  .content-item:nth-child(5) { animation-delay: 0.25s; }

  .content-item-type {
    font-size: 9px;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: var(--text-muted);
    margin-bottom: 5px;
    font-weight: 500;
    transition: color 0.35s;
  }

  .content-item-text {
    font-family: 'Caveat', cursive;
    font-size: 19px;
    line-height: 1.5;
    color: var(--text-primary);
    word-break: break-word;
    transition: color 0.35s;
  }

  .content-item-url {
    color: var(--accent-main);
    font-size: 13px;
    text-decoration: none;
    word-break: break-all;
    transition: color 0.15s;
  }

  .content-item-url:hover {
    text-decoration: underline;
  }

  .content-item-image {
    max-width: 100%;
    max-height: 300px;
    border-radius: 6px;
    object-fit: contain;
    display: block;
  }

  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-muted);
  }

  .empty-state-icon {
    font-size: 56px;
    margin-bottom: 12px;
    opacity: 0.4;
  }

  .empty-state-text {
    font-family: 'Caveat', cursive;
    font-size: 22px;
    transition: color 0.35s;
  }

  /* ─── ACTION BUTTONS ─── */
  .overlay-footer {
    position: relative;
    z-index: 2;
    padding: 12px 20px;
    padding-bottom: max(12px, env(safe-area-inset-bottom));
    border-top: 1px solid var(--border);
    background: var(--bg-surface);
    display: flex;
    justify-content: center;
    gap: 10px;
    transition: background 0.35s, border-color 0.35s;
  }

  .btn {
    padding: 10px 24px;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.5px;
    cursor: pointer;
    transition: all 0.15s;
    background: var(--bg-surface);
    color: var(--text-primary);
    -webkit-tap-highlight-color: transparent;
  }

  .btn:hover, .btn:active {
    transform: translateY(-1px);
    box-shadow: var(--shadow-soft);
    background: var(--bg-elevated);
  }

  .btn-primary {
    background: var(--btn-primary-bg);
    color: var(--btn-primary-color);
    border-color: var(--btn-primary-bg);
  }

  .btn-primary:hover, .btn-primary:active {
    background: var(--btn-primary-hover-bg);
    border-color: var(--btn-primary-hover-border);
    color: var(--btn-primary-color);
    box-shadow: var(--glow-accent);
  }

  .btn-danger {
    color: var(--accent-danger);
    border-color: var(--accent-danger);
  }

  .btn-danger:hover, .btn-danger:active {
    background: var(--accent-danger);
    color: white;
    box-shadow: var(--glow-danger);
  }

  .btn-save {
    background: var(--accent-save);
    color: var(--bg-deep);
    border-color: var(--accent-save);
    font-weight: 500;
  }

  .btn-save:hover, .btn-save:active {
    background: var(--accent-save-hover);
    border-color: var(--accent-save-hover);
    box-shadow: var(--glow-accent);
  }

  /* ─── EDIT MODE ─── */
  .edit-form {
    max-width: 700px;
    margin: 0 auto;
  }

  .edit-section {
    margin-bottom: 20px;
  }

  .edit-section-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 8px;
  }

  .edit-section-title {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: var(--text-muted);
    font-weight: 500;
    transition: color 0.35s;
  }

  .add-item-btn {
    font-size: 11px;
    padding: 4px 12px;
    border: 1.5px dashed var(--accent-main);
    background: none;
    color: var(--accent-main);
    border-radius: 4px;
    cursor: pointer;
    font-family: 'IBM Plex Mono', monospace;
    transition: all 0.15s;
    -webkit-tap-highlight-color: transparent;
  }

  .add-item-btn:hover, .add-item-btn:active {
    background: var(--accent-main-dim);
    box-shadow: var(--glow-accent);
  }

  .edit-item {
    display: flex;
    gap: 6px;
    margin-bottom: 6px;
    align-items: flex-start;
  }

  .edit-input {
    flex: 1;
    padding: 10px 12px;
    border: 1.5px solid var(--border);
    border-radius: 6px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 13px;
    background: var(--input-bg);
    color: var(--text-primary);
    transition: all 0.15s;
    resize: vertical;
  }

  .edit-input:focus {
    outline: none;
    border-color: var(--accent-main);
    background: var(--input-focus-bg);
    box-shadow: 0 0 0 3px var(--accent-main-dim);
  }

  .edit-input::placeholder {
    color: var(--text-muted);
    opacity: 0.6;
  }

  textarea.edit-input {
    min-height: 56px;
  }

  .remove-item-btn {
    width: 32px;
    height: 32px;
    flex-shrink: 0;
    border: none;
    background: none;
    color: var(--text-muted);
    cursor: pointer;
    font-size: 18px;
    border-radius: 4px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
    margin-top: 4px;
    -webkit-tap-highlight-color: transparent;
  }

  .remove-item-btn:hover, .remove-item-btn:active {
    color: var(--accent-danger);
    background: var(--accent-danger-dim);
  }

  /* ─── IMAGE UPLOAD UI ─── */
  .image-edit-block {
    flex: 1;
    min-width: 0;
  }

  .image-upload-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    width: 100%;
    padding: 12px 16px;
    border: 1.5px dashed var(--accent-main);
    border-radius: 6px;
    background: var(--accent-main-dim);
    color: var(--accent-main);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s;
    -webkit-tap-highlight-color: transparent;
  }

  .image-upload-btn:hover, .image-upload-btn:active {
    background: var(--accent-main);
    color: var(--bg-deep);
    border-style: solid;
    box-shadow: var(--glow-accent);
  }

  .image-upload-btn .upload-icon {
    font-size: 16px;
  }

  .image-thumb-preview {
    margin-top: 8px;
    position: relative;
    display: none;
  }

  .image-thumb-preview.has-image {
    display: block;
  }

  .image-thumb-preview img {
    max-width: 100%;
    max-height: 120px;
    border-radius: 6px;
    object-fit: contain;
    display: block;
    border: 1px solid var(--border-light);
  }

  .image-thumb-remove {
    position: absolute;
    top: 4px;
    right: 4px;
    width: 24px;
    height: 24px;
    background: var(--accent-danger);
    color: white;
    border: none;
    border-radius: 50%;
    font-size: 14px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0.9;
    transition: opacity 0.15s;
    -webkit-tap-highlight-color: transparent;
  }

  .image-thumb-remove:hover {
    opacity: 1;
  }

  .image-url-toggle {
    display: inline-block;
    margin-top: 8px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    color: var(--text-muted);
    cursor: pointer;
    border: none;
    background: none;
    padding: 0;
    transition: color 0.15s;
    -webkit-tap-highlight-color: transparent;
  }

  .image-url-toggle:hover, .image-url-toggle:active {
    color: var(--accent-main);
  }

  .image-url-wrapper {
    display: none;
    margin-top: 6px;
  }

  .image-url-wrapper.visible {
    display: block;
  }

  /* ─── STORAGE BAR ─── */
  .storage-bar {
    margin-top: 16px;
    padding: 10px 14px;
    background: var(--content-item-bg);
    border: 1px solid var(--border-light);
    border-radius: 6px;
    transition: background 0.35s, border-color 0.35s;
  }

  .storage-label {
    font-size: 9px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--text-muted);
    font-weight: 500;
    margin-bottom: 6px;
  }

  .storage-track {
    height: 6px;
    background: var(--border-light);
    border-radius: 3px;
    overflow: hidden;
  }

  .storage-fill {
    height: 100%;
    background: var(--accent-main);
    border-radius: 3px;
    transition: width 0.3s ease, background 0.3s ease;
  }

  .storage-fill.warning {
    background: var(--accent-danger);
  }

  .storage-text {
    font-size: 10px;
    color: var(--text-muted);
    margin-top: 4px;
    font-family: 'IBM Plex Mono', monospace;
  }

  /* ─── CONFIRM DIALOG ─── */
  .dialog-backdrop {
    position: fixed;
    inset: 0;
    z-index: 200;
    background: var(--dialog-backdrop);
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    display: none;
    align-items: center;
    justify-content: center;
  }

  .dialog-backdrop.visible {
    display: flex;
  }

  .dialog {
    background: var(--dialog-bg);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 28px;
    max-width: 340px;
    width: 90%;
    box-shadow: var(--shadow-lift);
    text-align: center;
    animation: dialogPop 0.2s ease;
    transition: background 0.35s, border-color 0.35s;
  }

  @keyframes dialogPop {
    from { transform: scale(0.95); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
  }

  .dialog-icon {
    font-size: 36px;
    margin-bottom: 10px;
  }

  .dialog-text {
    font-family: 'Caveat', cursive;
    font-size: 20px;
    color: var(--text-primary);
    margin-bottom: 20px;
    line-height: 1.3;
    transition: color 0.35s;
  }

  .dialog-buttons {
    display: flex;
    gap: 8px;
    justify-content: center;
  }

  /* ─── SCROLLBAR ─── */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb {
    background: var(--scrollbar-thumb);
    border-radius: 3px;
  }
  ::-webkit-scrollbar-thumb:hover { background: var(--scrollbar-hover); }

  /* ─── RESPONSIVE ─── */
  @media (min-width: 600px) {
    .top-bar { padding: 12px 24px; }
    .top-bar h1 { font-size: 32px; }
    .grid-container { padding: 16px; }
    .grid-controls label { display: block; }
    .overlay-body { padding: 32px 48px; }
    .overlay-header { padding: 16px 28px; }
    .overlay-footer { padding: 16px 28px; }
    .grid-cell { min-height: 80px; }
  }

  /* Safe areas for notched phones */
  @supports (padding-top: env(safe-area-inset-top)) {
    .top-bar {
      padding-top: max(10px, env(safe-area-inset-top));
    }
    .grid-container {
      padding-bottom: max(8px, env(safe-area-inset-bottom));
    }
  }
</style>
</head>
<body data-theme="cream">

<!-- Hidden file input for image upload -->
<input type="file" id="imageFileInput" accept="image/*" style="display:none">

<!-- TOP BAR -->
<div class="top-bar">
  <div class="top-bar-left">
    <h1>📝 Grid<span>Pad</span></h1>
  </div>
  <div class="top-bar-right">
    <div class="grid-controls">
      <label>Grid</label>
      <button class="grid-size-btn" data-cols="3" onclick="setGrid(3)">3</button>
      <button class="grid-size-btn active" data-cols="4" onclick="setGrid(4)">4</button>
      <button class="grid-size-btn" data-cols="5" onclick="setGrid(5)">5</button>
      <button class="grid-size-btn" data-cols="6" onclick="setGrid(6)">6</button>
    </div>
    <div style="position:relative">
      <button class="theme-toggle" id="themeToggle" onclick="toggleThemePicker()">🎨</button>
      <div class="theme-picker" id="themePicker">
        <button class="theme-option active" data-theme="cream" onclick="setTheme('cream')">
          <div class="theme-swatch swatch-cream"></div>
          Cream Paper
        </button>
        <button class="theme-option" data-theme="midnight" onclick="setTheme('midnight')">
          <div class="theme-swatch swatch-midnight"></div>
          Midnight
        </button>
        <button class="theme-option" data-theme="dusk" onclick="setTheme('dusk')">
          <div class="theme-swatch swatch-dusk"></div>
          Dusk
        </button>
        <div class="theme-picker-footer">
          <a class="privacy-link" href="https://gridpad.net/privacy.html" target="_blank" rel="noopener">Privacy Policy</a>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- GRID -->
<div class="grid-container">
  <div class="grid" id="grid"></div>
</div>

<!-- FULLSCREEN OVERLAY -->
<div class="overlay" id="overlay">
  <div class="overlay-header">
    <div class="overlay-header-left">
      <span class="overlay-notepad">📝</span>
      <span class="overlay-title" id="overlayTitle">Cell</span>
    </div>
    <button class="close-btn" onclick="handleClose()">✕</button>
  </div>
  <div class="overlay-body" id="overlayBody"></div>
  <div class="overlay-footer" id="overlayFooter"></div>
</div>

<!-- CONFIRM DIALOG -->
<div class="dialog-backdrop" id="dialogBackdrop">
  <div class="dialog">
    <div class="dialog-icon">🤔</div>
    <div class="dialog-text">You have unsaved changes.<br>Save or discard?</div>
    <div class="dialog-buttons">
      <button class="btn btn-danger" onclick="discardChanges()">Discard</button>
      <button class="btn btn-save" onclick="saveAndClose()">Save</button>
    </div>
  </div>
</div>

<script>
  // ─── STATE ───
  const TOTAL_CELLS = 48;
  let gridCols = 4;
  let currentCell = null;
  let isEditing = false;
  let editDirty = false;
  let cellData = {};
  let currentTheme = 'cream';
  let activeImageIndex = null; // tracks which image slot the file input is for

  // ─── IMAGE COMPRESSION ───
  function compressImage(file, maxDimension, quality) {
    maxDimension = maxDimension || 800;
    quality = quality || 0.65;
    return new Promise(function(resolve, reject) {
      var reader = new FileReader();
      reader.onload = function(e) {
        var img = new Image();
        img.onload = function() {
          var w = img.width;
          var h = img.height;
          // Scale down if needed
          if (w > maxDimension || h > maxDimension) {
            if (w > h) {
              h = Math.round(h * (maxDimension / w));
              w = maxDimension;
            } else {
              w = Math.round(w * (maxDimension / h));
              h = maxDimension;
            }
          }
          var canvas = document.createElement('canvas');
          canvas.width = w;
          canvas.height = h;
          var ctx = canvas.getContext('2d');
          ctx.drawImage(img, 0, 0, w, h);
          var dataUrl = canvas.toDataURL('image/jpeg', quality);
          resolve(dataUrl);
        };
        img.onerror = function() { reject(new Error('Failed to load image')); };
        img.src = e.target.result;
      };
      reader.onerror = function() { reject(new Error('Failed to read file')); };
      reader.readAsDataURL(file);
    });
  }

  // ─── STORAGE HELPERS ───
  function getStorageUsageBytes() {
    var total = 0;
    for (var key in localStorage) {
      if (localStorage.hasOwnProperty(key)) {
        total += (localStorage[key].length + key.length) * 2; // UTF-16
      }
    }
    return total;
  }

  function getStorageUsageMB() {
    return (getStorageUsageBytes() / (1024 * 1024)).toFixed(1);
  }

  // ─── PERSISTENCE ───
  function loadData() {
    try {
      const raw = localStorage.getItem('gridpad_data');
      if (raw) cellData = JSON.parse(raw);
      const cols = localStorage.getItem('gridpad_cols');
      if (cols) gridCols = parseInt(cols);
      const theme = localStorage.getItem('gridpad_theme');
      if (theme) {
        currentTheme = theme;
        document.body.setAttribute('data-theme', theme);
        updateThemePickerUI();
      }
    } catch(e) { console.warn('Could not load data:', e); }
  }

  function saveData() {
    try {
      localStorage.setItem('gridpad_data', JSON.stringify(cellData));
      localStorage.setItem('gridpad_cols', gridCols.toString());
      localStorage.setItem('gridpad_theme', currentTheme);
    } catch(e) {
      console.warn('Could not save data:', e);
      alert('Storage is full! Try removing some images to free up space.');
    }
  }

  // ─── THEME ───
  function setTheme(theme) {
    currentTheme = theme;
    document.body.setAttribute('data-theme', theme);
    updateThemePickerUI();
    saveData();
    closeThemePicker();
    // Notify Android host to update system bar colors
    if (window.AndroidBridge && window.AndroidBridge.onThemeChanged) {
      window.AndroidBridge.onThemeChanged(theme);
    }
  }

  function updateThemePickerUI() {
    document.querySelectorAll('.theme-option').forEach(opt => {
      opt.classList.toggle('active', opt.dataset.theme === currentTheme);
    });
  }

  function toggleThemePicker() {
    const picker = document.getElementById('themePicker');
    picker.classList.toggle('visible');
  }

  function closeThemePicker() {
    document.getElementById('themePicker').classList.remove('visible');
  }

  // Close picker when tapping outside
  document.addEventListener('click', (e) => {
    if (!e.target.closest('.theme-toggle') && !e.target.closest('.theme-picker')) {
      closeThemePicker();
    }
  });

  // ─── GRID ───
  function setGrid(cols) {
    gridCols = cols;
    document.querySelectorAll('.grid-size-btn').forEach(b => {
      b.classList.toggle('active', parseInt(b.dataset.cols) === cols);
    });
    saveData();
    renderGrid();
  }

  function renderGrid() {
    const grid = document.getElementById('grid');
    const rows = Math.ceil(TOTAL_CELLS / gridCols);
    grid.style.gridTemplateColumns = `repeat(${gridCols}, 1fr)`;
    grid.style.gridTemplateRows = `repeat(${rows}, 1fr)`;
    grid.innerHTML = '';

    for (let i = 0; i < TOTAL_CELLS; i++) {
      const cell = document.createElement('div');
      cell.className = 'grid-cell';
      const data = cellData[i];
      const hasContent = data && (
        (data.texts && data.texts.some(t => t.trim())) ||
        (data.urls && data.urls.some(u => u.trim())) ||
        (data.images && data.images.some(img => img.trim()))
      );

      if (hasContent) {
        cell.classList.add('has-content');
        const preview = document.createElement('div');
        preview.className = 'cell-preview';

        if (data.texts) {
          data.texts.filter(t => t.trim()).forEach(t => {
            const el = document.createElement('div');
            el.className = 'cell-preview-text';
            el.textContent = t;
            preview.appendChild(el);
          });
        }
        if (data.urls) {
          data.urls.filter(u => u.trim()).forEach(u => {
            const el = document.createElement('div');
            el.className = 'cell-preview-url';
            el.textContent = u;
            preview.appendChild(el);
          });
        }
        if (data.images) {
          data.images.filter(img => img.trim()).forEach(src => {
            const el = document.createElement('img');
            el.className = 'cell-preview-img';
            el.src = src;
            el.alt = '';
            el.onerror = () => el.style.display = 'none';
            preview.appendChild(el);
          });
        }
        cell.appendChild(preview);
      } else {
        const icon = document.createElement('div');
        icon.className = 'cell-empty-icon';
        icon.textContent = '+';
        cell.appendChild(icon);
      }

      cell.addEventListener('click', () => openCell(i));
      grid.appendChild(cell);
    }
  }

  // ─── OVERLAY ───
  function openCell(index) {
    currentCell = index;
    isEditing = false;
    editDirty = false;
    showViewMode();
    const overlay = document.getElementById('overlay');
    overlay.classList.add('visible');
    document.getElementById('overlayTitle').textContent = 'Cell ' + (index + 1);
  }

  function showViewMode() {
    isEditing = false;
    const body = document.getElementById('overlayBody');
    const footer = document.getElementById('overlayFooter');
    const data = cellData[currentCell] || { texts: [], urls: [], images: [] };
    const hasContent =
      (data.texts && data.texts.some(t => t.trim())) ||
      (data.urls && data.urls.some(u => u.trim())) ||
      (data.images && data.images.some(img => img.trim()));

    if (!hasContent) {
      body.innerHTML =
        '<div class="empty-state">' +
        '<div class="empty-state-icon">📋</div>' +
        '<div class="empty-state-text">Nothing here yet...</div>' +
        '</div>';
    } else {
      let html = '<div class="view-content">';
      let delay = 0;

      if (data.texts) {
        data.texts.filter(t => t.trim()).forEach(t => {
          html += '<div class="content-item" style="animation-delay:' + delay + 's">' +
            '<div class="content-item-type">Text</div>' +
            '<div class="content-item-text">' + escapeHtml(t) + '</div>' +
            '</div>';
          delay += 0.05;
        });
      }
      if (data.urls) {
        data.urls.filter(u => u.trim()).forEach(u => {
          const href = u.startsWith('http') ? u : 'https://' + u;
          html += '<div class="content-item" style="animation-delay:' + delay + 's">' +
            '<div class="content-item-type">Link</div>' +
            '<a class="content-item-url" href="' + escapeHtml(href) + '" target="_blank" rel="noopener">' + escapeHtml(u) + '</a>' +
            '</div>';
          delay += 0.05;
        });
      }
      if (data.images) {
        data.images.filter(img => img.trim()).forEach(src => {
          html += '<div class="content-item" style="animation-delay:' + delay + 's">' +
            '<div class="content-item-type">Image</div>' +
            '<img class="content-item-image" src="' + escapeHtml(src) + '" alt="" onerror="this.style.display=\'none\'">' +
            '</div>';
          delay += 0.05;
        });
      }

      html += '</div>';
      body.innerHTML = html;
    }

    footer.innerHTML = '<button class="btn btn-primary" onclick="showEditMode()">Edit</button>';
  }

  function showEditMode() {
    isEditing = true;
    editDirty = false;
    const footer = document.getElementById('overlayFooter');
    const data = cellData[currentCell] || { texts: [''], urls: [''], images: [''] };

    if (!data.texts || data.texts.length === 0) data.texts = [''];
    if (!data.urls || data.urls.length === 0) data.urls = [''];
    if (!data.images || data.images.length === 0) data.images = [''];

    renderEditForm(data);

    footer.innerHTML =
      '<button class="btn btn-save" onclick="saveChanges()">Save</button>' +
      '<button class="btn" onclick="handleClose()">Close</button>';
  }

  function renderEditForm(data) {
    const body = document.getElementById('overlayBody');
    let html = '<div class="edit-form">';

    // TEXTS
    html += '<div class="edit-section">' +
      '<div class="edit-section-header">' +
      '<span class="edit-section-title">📝 Text</span>' +
      '<button class="add-item-btn" onclick="addField(\'texts\')">+ add</button>' +
      '</div>';
    data.texts.forEach((t, i) => {
      html += '<div class="edit-item">' +
        '<textarea class="edit-input" data-type="texts" data-index="' + i + '" placeholder="Write something..." oninput="markDirty()">' + escapeHtml(t) + '</textarea>' +
        '<button class="remove-item-btn" onclick="removeField(\'texts\', ' + i + ')">×</button>' +
        '</div>';
    });
    html += '</div>';

    // URLS
    html += '<div class="edit-section">' +
      '<div class="edit-section-header">' +
      '<span class="edit-section-title">🔗 URLs</span>' +
      '<button class="add-item-btn" onclick="addField(\'urls\')">+ add</button>' +
      '</div>';
    data.urls.forEach((u, i) => {
      html += '<div class="edit-item">' +
        '<input class="edit-input" data-type="urls" data-index="' + i + '" placeholder="https://..." value="' + escapeHtml(u) + '" oninput="markDirty()">' +
        '<button class="remove-item-btn" onclick="removeField(\'urls\', ' + i + ')">×</button>' +
        '</div>';
    });
    html += '</div>';

    // IMAGES — new upload-first UI
    html += '<div class="edit-section">' +
      '<div class="edit-section-header">' +
      '<span class="edit-section-title">🖼️ Images</span>' +
      '<button class="add-item-btn" onclick="addField(\'images\')">+ add</button>' +
      '</div>';
    data.images.forEach((img, i) => {
      var hasImg = img && img.trim();
      var isDataUrl = hasImg && img.startsWith('data:');
      html += '<div class="edit-item" style="flex-direction:column; align-items:stretch;">' +
        '<div style="display:flex; gap:6px; align-items:flex-start;">' +
          '<div class="image-edit-block">' +
            // Hidden input holds the actual value (base64 or URL)
            '<input type="hidden" data-type="images" data-index="' + i + '" value="' + (hasImg ? escapeHtml(img) : '') + '">' +
            // Upload button
            '<button type="button" class="image-upload-btn" onclick="triggerImageUpload(' + i + ')">' +
              '<span class="upload-icon">📂</span> Choose from Gallery' +
            '</button>' +
            // Thumbnail preview
            '<div class="image-thumb-preview' + (hasImg ? ' has-image' : '') + '" id="imgPreview' + i + '">' +
              (hasImg ? '<img src="' + escapeHtml(img) + '" alt="" onerror="this.style.display=\'none\'">' : '') +
              (hasImg ? '<button class="image-thumb-remove" onclick="clearImage(' + i + ')">×</button>' : '') +
            '</div>' +
            // URL toggle
            '<button type="button" class="image-url-toggle" onclick="toggleUrlInput(' + i + ')">or paste image URL</button>' +
            // URL input (hidden by default, shown if current value is a URL)
            '<div class="image-url-wrapper' + (hasImg && !isDataUrl ? ' visible' : '') + '" id="imgUrlWrap' + i + '">' +
              '<input class="edit-input" id="imgUrlInput' + i + '" placeholder="https://..." value="' + (hasImg && !isDataUrl ? escapeHtml(img) : '') + '" oninput="onImageUrlInput(' + i + ')">' +
            '</div>' +
          '</div>' +
          '<button class="remove-item-btn" onclick="removeField(\'images\', ' + i + ')">×</button>' +
        '</div>' +
      '</div>';
    });
    html += '</div>';

    // Storage usage bar
    var usageMB = parseFloat(getStorageUsageMB());
    var maxMB = 10;
    var pct = Math.min(100, (usageMB / maxMB) * 100);
    var isWarning = usageMB > 8;
    html += '<div class="storage-bar">' +
      '<div class="storage-label">Local Storage — On Your Device</div>' +
      '<div class="storage-track"><div class="storage-fill' + (isWarning ? ' warning' : '') + '" style="width:' + pct + '%"></div></div>' +
      '<div class="storage-text">' + usageMB + ' MB / ~' + maxMB + ' MB</div>' +
    '</div>';

    html += '</div>';
    body.innerHTML = html;
  }

  // ─── IMAGE UPLOAD HANDLERS ───
  function triggerImageUpload(index) {
    activeImageIndex = index;
    var fileInput = document.getElementById('imageFileInput');
    fileInput.value = '';
    fileInput.click();
  }

  // File input change handler
  document.getElementById('imageFileInput').addEventListener('change', function(e) {
    var file = e.target.files && e.target.files[0];
    if (!file || activeImageIndex === null) return;
    var idx = activeImageIndex;

    compressImage(file, 800, 0.65).then(function(dataUrl) {
      // Set hidden input value
      var hidden = document.querySelector('input[data-type="images"][data-index="' + idx + '"]');
      if (hidden) hidden.value = dataUrl;

      // Show preview
      var preview = document.getElementById('imgPreview' + idx);
      if (preview) {
        preview.innerHTML = '<img src="' + dataUrl + '" alt="">' +
          '<button class="image-thumb-remove" onclick="clearImage(' + idx + ')">×</button>';
        preview.classList.add('has-image');
      }

      // Clear URL input if any
      var urlInput = document.getElementById('imgUrlInput' + idx);
      if (urlInput) urlInput.value = '';
      var urlWrap = document.getElementById('imgUrlWrap' + idx);
      if (urlWrap) urlWrap.classList.remove('visible');

      markDirty();
    }).catch(function(err) {
      console.warn('Image compression failed:', err);
      alert('Could not process image. Please try another one.');
    });
  });

  function clearImage(index) {
    var hidden = document.querySelector('input[data-type="images"][data-index="' + index + '"]');
    if (hidden) hidden.value = '';
    var preview = document.getElementById('imgPreview' + index);
    if (preview) {
      preview.innerHTML = '';
      preview.classList.remove('has-image');
    }
    var urlInput = document.getElementById('imgUrlInput' + index);
    if (urlInput) urlInput.value = '';
    markDirty();
  }

  function toggleUrlInput(index) {
    var wrap = document.getElementById('imgUrlWrap' + index);
    if (wrap) {
      wrap.classList.toggle('visible');
      if (wrap.classList.contains('visible')) {
        var input = document.getElementById('imgUrlInput' + index);
        if (input) input.focus();
      }
    }
  }

  function onImageUrlInput(index) {
    var urlInput = document.getElementById('imgUrlInput' + index);
    var hidden = document.querySelector('input[data-type="images"][data-index="' + index + '"]');
    if (urlInput && hidden) {
      hidden.value = urlInput.value;
    }
    // Show preview if URL looks valid
    var val = urlInput ? urlInput.value.trim() : '';
    var preview = document.getElementById('imgPreview' + index);
    if (val && (val.startsWith('http://') || val.startsWith('https://'))) {
      if (preview) {
        preview.innerHTML = '<img src="' + escapeHtml(val) + '" alt="" onerror="this.style.display=\'none\'">' +
          '<button class="image-thumb-remove" onclick="clearImage(' + index + ')">×</button>';
        preview.classList.add('has-image');
      }
    } else if (!val) {
      if (preview) {
        preview.innerHTML = '';
        preview.classList.remove('has-image');
      }
    }
    markDirty();
  }

  function markDirty() { editDirty = true; }

  function getEditData() {
    const data = { texts: [], urls: [], images: [] };
    document.querySelectorAll('[data-type]').forEach(el => {
      data[el.dataset.type][parseInt(el.dataset.index)] = el.value;
    });
    return data;
  }

  function addField(type) {
    const data = getEditData();
    data[type].push('');
    editDirty = true;
    renderEditForm(data);
    if (type !== 'images') {
      setTimeout(() => {
        const fields = document.querySelectorAll('[data-type="' + type + '"]');
        if (fields.length) fields[fields.length - 1].focus();
      }, 50);
    }
  }

  function removeField(type, index) {
    const data = getEditData();
    data[type].splice(index, 1);
    if (data[type].length === 0) data[type] = [''];
    editDirty = true;
    renderEditForm(data);
  }

  function saveChanges() {
    const data = getEditData();
    cellData[currentCell] = data;
    saveData();
    editDirty = false;
    showViewMode();
    renderGrid();
  }

  function handleClose() {
    if (isEditing && editDirty) {
      document.getElementById('dialogBackdrop').classList.add('visible');
    } else {
      closeOverlay();
    }
  }

  function saveAndClose() {
    document.getElementById('dialogBackdrop').classList.remove('visible');
    saveChanges();
    closeOverlay();
  }

  function discardChanges() {
    document.getElementById('dialogBackdrop').classList.remove('visible');
    editDirty = false;
    closeOverlay();
  }

  function closeOverlay() {
    document.getElementById('overlay').classList.remove('visible');
    currentCell = null;
    isEditing = false;
    editDirty = false;
  }

  // ─── UTILS ───
  function escapeHtml(str) {
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  // ─── KEYBOARD ───
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') {
      if (document.getElementById('dialogBackdrop').classList.contains('visible')) {
        discardChanges();
      } else if (document.getElementById('overlay').classList.contains('visible')) {
        handleClose();
      }
    }
  });

  // ─── ANDROID BACK BUTTON ───
  window.addEventListener('popstate', (e) => {
    if (document.getElementById('dialogBackdrop').classList.contains('visible')) {
      discardChanges();
      e.preventDefault();
    } else if (document.getElementById('overlay').classList.contains('visible')) {
      handleClose();
      e.preventDefault();
    }
  });

  // Push initial state for back button handling
  if (window.history && window.history.pushState) {
    window.history.pushState({}, '');
  }

  // ─── INIT ───
  loadData();
  setGrid(gridCols);
</script>
</body>
</html>
